name: phas_mobile
description: "PHAS — Platform Health Accountability System citizen app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0-327.4.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  go_router: ^17.3.0
  http: ^1.6.0
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^22.0.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.3
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#0055A4"
  android_12:
    color: "#0055A4"
  fullscreen: false

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/phas-icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/phas-icon.png
